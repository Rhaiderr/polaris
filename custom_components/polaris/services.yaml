run_triage:
  fields:
    account:
      required: false
      example: "user@gmail.com"
      selector:
        text:
    mode:
      required: false
      default: incremental
      selector:
        select:
          options:
            - incremental
            - full
    max:
      required: false
      selector:
        number:
          min: 1
          max: 500
          mode: box
    dry_run:
      required: false
      selector:
        boolean:
    reprocess:
      required: false
      default: false
      selector:
        boolean:

suggest_categories:
  fields:
    account:
      required: true
      example: "user@gmail.com"
      selector:
        text:
    max:
      required: false
      default: 120
      selector:
        number:
          min: 20
          max: 500
          mode: box

accept_categories:
  fields:
    account:
      required: true
      example: "user@gmail.com"
      selector:
        text:
    numbers:
      required: true
      example: "1,3"
      selector:
        text:
