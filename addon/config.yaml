# Manifesto do add-on Polaris para o Home Assistant Supervisor.
# Docs: https://developers.home-assistant.io/docs/add-ons/configuration
name: Polaris
slug: polaris
version: "0.1.0"
description: Triagem de Gmail com LLM local — wizard de onboarding + execução agendada.
url: https://github.com/Rhaiderr/polaris
# Arquiteturas: Pi 5 (aarch64) e PC/NUC (amd64). O trabalho pesado (LLM) é remoto.
arch:
  - aarch64
  - amd64

# Front do wizard via ingress (HA faz o proxy; sem expor porta na rede).
ingress: true
ingress_port: 8099
panel_icon: mdi:email-check-outline
panel_title: Polaris

# Guarda token.json / categorias.yaml / logs entre reinícios e updates.
# Usamos /data (volume persistente do add-on) — ver run.sh.
init: false

# Opções expostas na UI do add-on (viram /data/options.json no container).
# O endpoint também pode ser configurado pela Tela 2 do wizard.
options:
  llm_base_url: "http://homeassistant.local:1234/v1"
  llm_model: "qwen3-coder-30b-a3b-instruct"
  llm_api_key: ""
  modo_sombra_exclusao: false
schema:
  llm_base_url: url
  llm_model: str
  llm_api_key: password?
  modo_sombra_exclusao: bool
